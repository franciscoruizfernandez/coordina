<!-- backend/test-websocket.html -->
<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Test Events WebSocket</title>
  <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
  <style>
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #ddd; }
    #messages { margin-top: 20px; }
    .event { padding: 10px; margin: 5px 0; border-left: 3px solid #4CAF50; background: #2d2d2d; }
    .event.nova { border-color: #2196F3; }
    .event.assignada { border-color: #FF9800; }
    .event.gps { border-color: #9C27B0; }
  </style>
</head>
<body>
  <h1>🔌 Listener d'Events WebSocket</h1>
  <div id="status">❌ Desconnectat</div>
  <div id="messages"></div>

  <script>
    const TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiIxNDRhODY1ZS1kYTY2LTRlODgtYjMyNC1kYWM4MjNkMDdhNmMiLCJ1c2VybmFtZSI6ImFkbWluIiwicm9sIjoiYWRtaW5pc3RyYWRvciIsImlhdCI6MTc3NjY4MDIzOCwiZXhwIjoxNzc2NzY2NjM4fQ.jP4Q-vQOjTIXQ9j8196q8fwD8lQWsQ3IjHgwJLERlcU'; 

    const socket = io('http://localhost:3000', {
      auth: { token: TOKEN }
    });

    socket.on('connect_error', (err) => {
      console.log('ERROR REAL:', err.message, err);
    });

    const addMessage = (type, title, data) => {
      const div = document.getElementById('messages');
      const el = document.createElement('div');
      el.className = `event ${type}`;
      el.innerHTML = `<strong>${title}</strong><pre>${JSON.stringify(data, null, 2)}</pre>`;
      div.insertBefore(el, div.firstChild);
    };

    socket.on('connect', () => {
      document.getElementById('status').innerHTML = '✅ Connectat: ' + socket.id;
    });

    socket.on('connexio_exitosa', (data) => {
      addMessage('', '✅ Connexió exitosa', data);
    });

    // Events que escoltem
    socket.on('nova_incidencia', (data) => {
      addMessage('nova', '🆕 NOVA INCIDÈNCIA', data);
    });

    socket.on('incidencia_actualitzada', (data) => {
      addMessage('', '📝 Incidència actualitzada', data);
    });

    socket.on('incidencia_assignada', (data) => {
      addMessage('assignada', '🚨 INCIDÈNCIA ASSIGNADA', data);
    });

    socket.on('canvi_estat_incidencia', (data) => {
      addMessage('', "🔄 Canvi d'estat", data);
    });

    socket.on('ubicacio_indicatiu', (data) => {
      addMessage('gps', '📍 GPS Actualitzat', data);
    });

    socket.on('canvi_estat_indicatiu', (data) => {
      addMessage('', '🚔 Canvi estat indicatiu', data);
    });

    socket.on('disconnect', () => {
      document.getElementById('status').innerHTML = '❌ Desconnectat';
    });
  </script>
</body>
</html>
